  <script>
// Poets data
const poets = [
  {name:'Pablo Neruda', poems:[
    {cat:'Para sentirse especial',title:'Poema 20',text:"Puedo escribir los versos más tristes esta noche.\nEscribir, por ejemplo: La noche está estrellada,\ny tiritan, azules, los astros, a lo lejos.\nEl viento de la noche gira en el cielo y canta.\nPuedo escribir los versos más tristes esta noche.\nYo la quise, y a veces ella también me quiso.\nEn las noches como ésta la tuve entre mis brazos.\nLa besé tantas veces bajo el cielo infinito.\nElla me quiso, a veces yo también la quería.\nCómo no haber amado sus grandes ojos fijos.\nPuedo escribir los versos más tristes esta noche.\nPensar que no la tengo. Sentir que la he perdido.\nOír la noche inmensa, más inmensa sin ella.\nY el verso cae al alma como al pasto el rocío.\nQué importa que mi amor no pudiera guardarla.\nLa noche está estrellada y ella no está conmigo.\nEso es todo. A lo lejos alguien canta. A lo lejos\nMi alma no se contenta con haberla perdido.\nComo para acercarla mi mirada la busca.\nMi corazón la busca, y ella no está conmigo.\nLa misma noche que hace blanquear los mismos árboles.\nNosotros, los de entonces, ya no somos los mismos.\nYa no la quiero, es cierto, pero cuánto la quise.\nMi voz buscaba el viento para tocar su oído.\nDe otro. Será de otro. Como antes de mis besos.\nSu voz, su cuerpo claro. Sus ojos infinitos.\nYa no la quiero, es cierto, pero tal vez la quiero.\nEs tan corto el amor, y es tan largo el olvido.\nPorque en noches como ésta la tuve entre mis brazos,\nmi alma no se contenta con haberla perdido.\nAunque éste sea el último dolor que ella me causa,\ny estos sean los últimos versos que yo le escribo."},
    {cat:'Para conmover tu ser',title:'Soneto XVII',text:"No te amo como si fueras rosa de sal, topacio\no flecha de claveles que propagan el fuego:\nte amo como se aman ciertas cosas oscuras,\nsecretamente, entre la sombra y el alma.\nTe amo como la planta que no florece y lleva\ndentro de sí, escondida, la luz de aquellas flores,\ny gracias a tu amor vive oscuro en mi cuerpo\nel apretado aroma que ascendió de la tierra.\nTe amo sin saber cómo, ni cuándo, ni de dónde,\nte amo directamente sin problemas ni orgullo:\nasí te amo porque no sé amar de otra manera,\nsino así de este modo en que no soy ni eres,\ntan cerca que tu mano sobre mi pecho es mía,\ntan cerca que se cierran tus ojos con mi sueño."},
    {cat:'Para admirar tu belleza',title:'Poema 15',text:"Me gustas cuando callas porque estás como ausente,\ny me oyes desde lejos, y mi voz no te toca.\nParece que los ojos se te hubieran volado\ny parece que un beso te cerrara la boca.\n\nComo todas las cosas están llenas de mi alma\nemerges de las cosas, llena del alma mía.\nMariposa de sueño, te pareces a mi alma,\ny te pareces a la palabra melancolía.\n\nMe gustas cuando callas y estás como distante.\nY estás como quejándote, mariposa en arrullo.\nY me oyes desde lejos, y mi voz no te alcanza:\ndéjame que me calle con el silencio tuyo.\n\nDéjame que te hable también con tu silencio\nclaro como una lámpara, simple como un anillo.\nEres como la noche, callada y constelada.\nTu silencio es de estrella, tan lejano y sencillo.\n\nMe gustas cuando callas porque estás como ausente.\nDistante y dolorosa como si hubieras muerto.\nUna palabra entonces, una sonrisa bastan.\nY estoy alegre, alegre de que no sea cierto."}
  ]},
  {name:'Mario Benedetti', poems:[
    {cat:'Para sentirse especial',title:'Te quiero',text:"Tus manos son mi caricia\nmis acordes cotidianos\nte quiero porque tus manos\ntrabajan por la justicia\n\nsi te quiero es porque sos\nmi amor mi cómplice y todo\ny en la calle codo a codo\nsomos mucho más que dos\n\ntus ojos son mi conjuro\ncontra la mala jornada\nte quiero por tu mirada\nque mira y siembra futuro\n\ntu boca que es tuya y mía\ntu boca no se equivoca\nte quiero porque tu boca\nsabe gritar rebeldía\n\nsi te quiero es porque sos\nmi amor mi cómplice y todo\ny en la calle codo a codo\nsomos mucho más que dos\n\ny por tu rostro sincero\ny tu paso vagabundo\ny tu llanto por el mundo\nporque sos pueblo te quiero\n\ny porque amor no es aureola\nni cándida moraleja\ny porque somos pareja\nque sabe que no está sola\n\nte quiero en mi paraíso\nes decir que en mi país\nla gente viva feliz\naunque no tenga permiso\n\nsi te quiero es porque sos\nmi amor mi cómplice y todo\ny en la calle codo a codo\nsomos mucho más que dos."},
    {cat:'Para conmover tu ser',title:'Táctica y estrategia',text:"Mi táctica es\nmirarte\naprender como sos\nquererte como sos\n\nmi táctica es\nhablarte\ny escucharte\nconstruir con palabras\nun puente indestructible\n\nmi táctica es\nquedarme en tu recuerdo\nno sé cómo ni sé\ncon qué pretexto\npero quedarme en vos\n\nmi táctica es\nser franco\ny saber que sos franca\ny que no nos vendamos\nsimulacros\npara que entre los dos\nno haya telón\nni abismos\n\nmi estrategia es\nen cambio\nmás profunda y más\nsimple\n\nmi estrategia es\nque un día cualquiera\nno sé cómo ni sé\ncon qué pretexto\npor fin me necesites."},
    {cat:'Para admirar tu belleza',title:'Corazón coraza',text:"Porque te tengo y no\nporque te pienso\nporque la noche está de ojos abiertos\nporque la noche pasa y digo amor\nporque has venido a recoger tu imagen\ny eres mejor que todas tus imágenes\nporque eres linda desde el pie hasta el alma\nporque eres buena desde el alma a mí\nporque te escondes dulce en el orgullo\npequeña y dulce\ncorazón coraza\n\nporque eres mía\nporque no eres mía\nporque te miro y muero\ny peor que muero\nsi no te miro amor\nsi no te miro\n\nporque tú siempre existes dondequiera\npero existes mejor donde te quiero\nporque tu boca es sangre\ny tienes frío\ntengo que amarte amor\ntengo que amarte\naunque esta herida duela como dos\naunque te busque y no te encuentre\ny aunque\nla noche pase y yo te tenga\ny no."}
  ]},
  {name:'Gustavo Adolfo Bécquer', poems:[
    {cat:'Para alguien especial',title:'Rima XXI',text:"¿Qué es poesía?, dices, mientras clavas\nen mi pupila tu pupila azul,\n¡Qué es poesía! ¿Y tú me lo preguntas?\nPoesía... eres tú."},
    {cat:'Para emocionar tu ser',title:'Rima XI',text:"Yo soy ardiente, yo soy morena,\nyo soy el símbolo de la pasión,\nde ansia de goces mi alma está llena.\n¿A mí me buscas?\nNo es a ti, no.\n\nMi frente es pálida, mis trenzas de oro:\npuedo brindarte dichas sin fin,\nyo de ternuras guardo un tesoro.\n¿A mí me llamas?\nNo, no es a ti.\n\nYo soy un sueño, un imposible,\nvano fantasma de niebla y luz;\nsoy incorpórea, soy intangible:\nno puedo amarte.\n¡Oh ven, ven tú!"},
    {cat:'Para admirar tu belleza',title:'Tu pupila es Azul',text:"Tu pupila es azul y, cuando ríes,\nsu claridad suave me recuerda\nel trémulo fulgor de la mañana\nque en el mar se refleja.\nTu pupila es azul y, cuando lloras,\nlas transparentes lágrimas en ella\nse me figuran gotas de rocío\nsobre una violeta.\nTu pupila es azul, y si en su fondo\ncomo un punto de luz radia una idea,\nme parece en el cielo de la tarde\nuna perdida estrella."}
  ]},
  {name:'Alfonsina Storni', poems:[
    {cat:'Para alguien especial',title:'Tú me quieres blanca',text:"Tú me quieres alba,\nMe quieres de espumas,\nMe quieres de nácar.\nQue sea azucena\nSobre todas, casta.\nDe perfume tenue.\nCorola cerrada.\n\nNi un rayo de luna\nFiltrado me haya.\nNi una margarita\nSe diga mi hermana.\nTú me quieres nívea,\nTú me quieres blanca,\nTú me quieres alba.\n\nTú que hubiste todas\nLas copas a mano,\nDe frutos y mieles\nLos labios morados.\nTú que en el banquete\nCubierto de pámpanos\nDejaste las carnes\nFestejando a Baco.\n\nTú que en los jardines\nNegros del Engaño\nVestido de rojo\nCorriste al Estrago.\n\nTú que el esqueleto\nConservas intacto\nNo sé todavía\nPor cuáles milagros,\nMe pretendes blanca\n(Dios te lo perdone),\nMe pretendes casta\n(Dios te lo perdone),\nMe pretendes alba.\n\nHuye hacia los bosques;\nVete a la montaña;\nLímpiate la boca;\nVive en las cabañas;\nToca con las manos\nLa tierra mojada;\nAlimenta el cuerpo\nCon raíz amarga;\nBebe de las rocas;\nDuerme sobre escarcha;\nRenueva tejidos\nCon salitre y agua;\nHabla con los pájaros\nY lévate al alba.\nY cuando las carnes\nTe sean tornadas,\nY cuando hayas puesto\nEn ellas el alma\nQue por las alcobas\nSe quedó enredada,\nEntonces, buen hombre,\nPreténdeme blanca,\nPreténdeme nívea,\nPreténdeme casta."},
    {cat:'Para ver tu sonrirsa',title:'Dolor',text:"Quisiera esta tarde divina de octubre\npasear por la orilla lejana del mar;\nque la arena de oro, y las aguas verdes,\ny los cielos puros me vieran pasar.\n\nSer alta, soberbia, perfecta, quisiera,\ncomo una romana, para concordar\ncon las grandes olas, y las rocas muertas\ny las anchas playas que ciñen el mar.\n\nCon el paso lento, y los ojos fríos\ny la boca muda, dejarme llevar;\nver cómo se rompen las olas azules\ncontra los granitos y no parpadear;\nver cómo las aves rapaces se comen\nlos peces pequeños y no despertar;\npensar que pudieran las frágiles barcas\nhundirse en las aguas y no suspirar;\nver que se adelanta, la garganta al aire,\nel hombre más bello, no desear amar...\n\nPerder la mirada, distraídamente,\nperderla y que nunca la vuelva a encontrar:\ny, figura erguida, entre cielo y playa,\nsentirme el olvido perenne del mar."},
    {cat:'Para admirar tu belleza',title:'Alma desnuda',text:"Soy un alma desnuda en estos versos,\nAlma desnuda que angustiada y sola\nVa dejando sus pétalos dispersos.\n\nAlma que puede ser una amapola,\nQue puede ser un lirio, una violeta,\nUn peñasco, una selva y una ola.\n\nAlma que como el viento vaga inquieta\nY ruge cuando está sobre los mares,\nY duerme dulcemente en una grieta.\n\nAlma que adora sobre sus altares,\nDioses que no se bajan a cegarla;\nAlma que no conoce valladares.\n\nAlma que fuera fácil dominarla\nCon sólo un corazón que se partiera\nPara en su sangre cálida regarla.\n\nAlma que cuando está en la primavera\nDice al invierno que demora: vuelve,\nCaiga tu nieve sobre la pradera.\n\nAlma que cuando nieva se disuelve\nEn tristezas, clamando por las rosas\ncon que la primavera nos envuelve.\n\nAlma que a ratos suelta mariposas\nA campo abierto, sin fijar distancia,\nY les dice: libad sobre las cosas.\n\nAlma que ha de morir de una fragancia\nDe un suspiro, de un verso en que se ruega,\nSin perder, a poderlo, su elegancia.\n\nAlma que nada sabe y todo niega\nY negando lo bueno el bien propicia\nPorque es negando como más se entrega.\n\nAlma que suele haber como delicia\nPalpar las almas, despreciar la huella,\nY sentir en la mano una caricia.\n\nAlma que siempre disconforme de ella,\nComo los vientos vaga, corre y gira;\nAlma que sangra y sin cesar delira\nPor ser el buque en marcha de la estrella."}
  ]},
  {name:'Federico García Lorca', poems:[
    {cat:'Para alguien importante',title:'Soneto de la dulce queja',text:"Tengo miedo a perder la maravilla\nde tus ojos de estatua y el acento\nque de noche me pone en la mejilla\nla solitaria rosa de tu aliento.\n\nTengo pena de ser en esta orilla\ntronco sin ramas; y lo que más siento\nes no tener la flor, pulpa o arcilla,\npara el gusano de mi sufrimiento.\n\nSi tú eres el tesoro oculto mío,\nsi eres mi cruz y mi dolor mojado,\nsi soy el perro de tu señorío,\n\nno me dejes perder lo que he ganado\ny decora las aguas de tu río\ncon hojas de mi otoño enajenado."},
    {cat:'Para emocionar tu corazón',title:'Es verdad',text:"¡Ay qué trabajo me cuesta\nquererte como te quiero!\n\nPor tu amor me duele el aire,\nel corazón\ny el sombrero.\n\n¿Quién me compraría a mí\neste cintillo que tengo\ny esta tristeza de hilo\nblanco, para hacer pañuelos?\n\n¡Ay qué trabajo me cuesta\nquererte como te quiero!"},
    {cat:'Para admirar tu belleza',title:'Gacela del amor imprevisto',text:"Nadie comprendía el perfume\nde la oscura magnolia de tu vientre.\nNadie sabía que martirizabas\nun colibrí de amor entre los dientes.\n\nMil caballitos persas se dormían\nen la plaza con luna de tu frente,\nmientras que yo enlazaba cuatro noches\ntu cintura, enemiga de la nieve.\n\nEntre yeso y jazmines, tu mirada\nera un pálido ramo de simientes.\nYo busqué, para darte, por mi pecho\nlas letras de marfil que dicen siempre.\n\nSiempre, siempre: jardín de mi agonía,\ntu cuerpo fugitivo para siempre,\nla sangre de tus venas en mi boca,\ntu boca ya sin luz para mi muerte."}
  ]},

// Page navigation
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('app').scrollTop=0;
  // Re-trigger animations
  document.getElementById(id).querySelectorAll('.fade-up').forEach(el=>{
    el.style.animation='none';el.offsetHeight;el.style.animation='';
  });
}

function showPoet(i){
  console.log("CLICK", i, poets[i]);
  const p=poets[i];
  document.getElementById('poetName').textContent=p.name;
  const container=document.getElementById('poetCards');
  container.innerHTML='';
  p.poems.forEach((poem,idx)=>{
    const card=document.createElement('div');
    card.className='card-poem fade-up';
    card.style.animationDelay=`${.2+idx*.2}s`;card.style.opacity='0';
    const dedic=window.elementSdk?.config?.dedicatoria_nombre;
    const dedicLine=dedic?`<p style="font-family:'Dancing Script',cursive;color:#8b4557;font-size:.95rem;margin-bottom:.5rem">Para ${dedic} ✨</p>`:'';
    card.innerHTML=`
      <p style="font-family:'Dancing Script',cursive;color:#d4a843;font-size:1.1rem;margin-bottom:.25rem">${poem.cat}</p>
      <h3 class="text-main" style="font-family:'Playfair Display',serif;font-size:1.4rem;color:#5a3a42;margin-bottom:.5rem">${poem.title}</h3>
      ${dedicLine}
      <p class="poem-text" style="white-space:pre-line;line-height:1.8;color:#5a3a42;font-size:1.05rem">${poem.text}</p>
      <div class="flex gap-3 mt-4">
        <button onclick="copyPoem(this)" class="flex items-center gap-1 px-4 py-2 rounded-full cursor-pointer" style="background:#8b455722;border:1px solid #8b455533;color:#8b4557;font-family:'Cormorant Garamond',serif;font-size:.9rem;transition:all .3s"><i data-lucide="copy" style="width:14px;height:14px"></i> Copiar</button>
      </div>`;
    container.appendChild(card);
  });
  showPage('pageDetail');
  lucide.createIcons();
}

function copyPoem(btn){
    const card  = btn.closest('.card-poem');
    const texto = 
    card.querySelector('.poem-text').innerText;

    navigator.clipboard.writeText(texto).then(()=>{
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(()=>toast.classList.remove('show'),2000);
    });
}

// Audio
let audioCtx,isPlaying=false;
function toggleAudio(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(isPlaying){audioCtx.suspend();isPlaying=false;document.getElementById('audioIcon').setAttribute('data-lucide','volume-x');}
  else{
    if(audioCtx.state==='suspended')audioCtx.resume();
    else playAmbient();
    isPlaying=true;document.getElementById('audioIcon').setAttribute('data-lucide','volume-2');
  }
  lucide.createIcons();
}
function playAmbient(){
  const g=audioCtx.createGain();g.gain.value=.06;g.connect(audioCtx.destination);
  function playNote(){
    if(!isPlaying)return;
    const o=audioCtx.createOscillator();const ng=audioCtx.createGain();
    o.type='sine';
    const notes=[261.63,293.66,329.63,349.23,392,440,493.88,523.25];
    o.frequency.value=notes[Math.floor(Math.random()*notes.length)];
    ng.gain.setValueAtTime(0,audioCtx.currentTime);
    ng.gain.linearRampToValueAtTime(.04,audioCtx.currentTime+.3);
    ng.gain.linearRampToValueAtTime(0,audioCtx.currentTime+2);
    o.connect(ng);ng.connect(g);o.start();o.stop(audioCtx.currentTime+2);
    setTimeout(playNote,1500+Math.random()*2000);
  }
  playNote();
}

function applyConfig(c){
  // Cover title
  const title=c.main_title||defaultConfig.main_title;
  const lines=title.split('\n');
  const el=document.getElementById('coverTitle');
  if(lines.length>=3)el.innerHTML=lines.slice(0,-1).join('<br>')+'<br><span class="shimmer-text" style="font-size:1.3rem">'+lines[lines.length-1]+'</span>';
  else el.textContent=title;

  // Dedicatoria
  const ded=document.getElementById('coverDedicatoria');
  if(c.dedicatoria_nombre)ded.textContent='Con cariño para '+c.dedicatoria_nombre+' 💝';
  else ded.textContent='';

  // Button
  document.getElementById('btnDescubrir').textContent=c.boton_descubrir||defaultConfig.boton_descubrir;

  // Colors
  const bg=c.background_color||defaultConfig.background_color;
  const txt=c.text_color||defaultConfig.text_color;
  const primary=c.primary_action_color||defaultConfig.primary_action_color;
  const accent=c.accent_color||defaultConfig.accent_color;
  document.getElementById('app').style.background=bg;
  document.querySelectorAll('.text-main').forEach(e=>e.style.color=txt);
  document.querySelectorAll('.text-sub').forEach(e=>e.style.color=primary);
  document.getElementById('btnDescubrir').style.background=`linear-gradient(135deg,${primary},${primary}cc)`;

  // Font
  const font=c.font_family||defaultConfig.font_family;
  const base=c.font_size||defaultConfig.font_size;
  el.style.fontFamily=`${font}, Dancing Script, cursive`;
  el.style.fontSize=`${base*1.6/16}rem`;
  document.getElementById('poetName').style.fontFamily=`${font}, Dancing Script, cursive`;
}
